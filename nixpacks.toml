# Nixpacks 빌드 계획 — Python API 전용 (Dockerfile 없음)
# railway.toml 의 buildCommand 와 함께 사용
# https://nixpacks.com/docs/configuration/file

[variables]
NIXPACKS_PYTHON_VERSION = "3.12"
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
# API + 정적 프론트(client/dist) 빌드를 위해 Node 22 런타임 포함
nixPkgs = ["...", "nodejs_22"]
