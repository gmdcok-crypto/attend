# Railway — Docker / Dockerfile / Railpack 자동 이미지 빌드 사용 안 함.
# 빌더는 Nixpacks만 사용한다. (대시보드 Build 에서도 Nixpacks 선택 권장)
# https://docs.railway.com/reference/config-as-code

[build]
builder = "NIXPACKS"
# 프론트(client) 정적 빌드 후 FastAPI 의존성 설치
buildCommand = "cd client && npm ci && npx tsc && npx vite build && cd .. && pip install --no-cache-dir -r requirements.txt"

[deploy]
# --log-level warning: 접속/재시작 시 로그 폭주로 Railway 500 logs/s 제한 완화
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT --log-level warning"
